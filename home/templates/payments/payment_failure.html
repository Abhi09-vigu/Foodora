{% extends 'base.html' %}

{% block title %}Payment Failed{% endblock %}

{% block content %}
<div class="container pb-4">
  <div class="section-card p-4">
    <h1 class="h4 mb-1">Payment failed</h1>
    <div class="text-muted small">Order #{{ order.id }}</div>

    <hr />

    <div class="product-card p-3">
      {% if error %}
        <div class="text-muted">{{ error }}</div>
      {% else %}
        <div class="text-muted">Your payment was not completed (failed or cancelled). You can try again.</div>
      {% endif %}
      <div class="mt-3 d-flex gap-2 flex-wrap">
        <a class="btn btn-brand" href="{% url 'payments:payment_with_id' order.id %}">Try payment again</a>
        <a class="btn btn-outline-brand" href="{% url 'orders:detail' order.id %}">View order</a>
      </div>
    </div>
  </div>
</div>
{% endblock %}

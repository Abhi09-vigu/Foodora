{% load static %}
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% block title %}Admin{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="{% static 'css/site.css' %}" rel="stylesheet" />
</head>
<body>
<nav class="navbar navbar-expand-lg py-3 admin-navbar">
  <div class="container">
    <a class="navbar-brand" href="{% url 'adminpanel:dashboard' %}">Private Admin</a>
    <div class="d-flex gap-2 flex-wrap">
      <a class="admin-nav-btn" href="{% url 'adminpanel:items' %}">Items</a>
      <a class="admin-nav-btn" href="{% url 'adminpanel:categories' %}">Categories</a>
      <a class="admin-nav-btn" href="{% url 'adminpanel:orders' %}">Orders</a>
      <a class="admin-nav-btn" href="{% url 'adminpanel:customers' %}">Customers</a>
      <a class="admin-nav-btn" href="{% url 'adminpanel:coupons' %}">Coupons</a>
      <a class="admin-nav-btn" href="{% url 'adminpanel:reports' %}">Reports</a>
      <a class="admin-nav-btn admin-nav-btn-primary" href="{% url 'adminpanel:logout' %}">Logout</a>
    </div>
  </div>
</nav>

<div class="container py-4 pb-5">
  <div class="admin-surface p-4">
    {% if messages %}
      {% for message in messages %}
        <div class="alert alert-{{ message.tags }} mb-2">{{ message }}</div>
      {% endfor %}
    {% endif %}

    {% block content %}{% endblock %}
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

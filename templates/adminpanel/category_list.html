{% extends 'adminpanel/base.html' %}

{% block title %}Categories{% endblock %}

{% block content %}
  <div class="section-card p-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
      <h1 class="h4 mb-0">Categories</h1>
      <a class="btn btn-brand" href="{% url 'adminpanel:category_add' %}">Add</a>
    </div>

    <div class="table-responsive">
      <table class="table align-middle">
        <thead><tr><th>Name</th><th>Description</th><th style="width:180px"></th></tr></thead>
        <tbody>
          {% for c in categories %}
            <tr>
              <td class="fw-semibold">{{ c.name }}</td>
              <td class="text-muted">{{ c.description|truncatechars:80 }}</td>
              <td class="text-end">
                <a class="btn btn-sm btn-outline-secondary" href="{% url 'adminpanel:category_edit' c.id %}">Edit</a>
                <form class="d-inline" method="post" action="{% url 'adminpanel:category_delete' c.id %}">{% csrf_token %}
                  <button class="btn btn-sm btn-outline-danger" type="submit">Delete</button>
                </form>
              </td>
            </tr>
          {% empty %}
            <tr><td colspan="3" class="text-muted">No categories yet.</td></tr>
          {% endfor %}
        </tbody>
      </table>
    </div>
  </div>
{% endblock %}

{% extends 'base.html' %}

{% block title %}Payment Success | Foodora{% endblock %}

{% block content %}
<div class="container pb-4" style="max-width:880px;">
  <div class="section-card p-4">
    <h1 class="h4 mb-2">Payment successful</h1>
    <div class="text-muted mb-3">Order #{{ order.id }} is confirmed.</div>

    <div class="product-card p-3 mb-3">
      <div class="d-flex justify-content-between">
        <div class="fw-semibold">Total paid</div>
        <div class="fw-bold">₹{{ order.total }}</div>
      </div>
    </div>

    <div class="d-flex flex-wrap gap-2">
      <a class="btn btn-brand" href="{% url 'orders:detail' order.id %}">Track order</a>
      <a class="btn btn-outline-secondary" href="{% url 'orders:invoice' order.id %}">Invoice</a>
      <a class="btn btn-outline-secondary" href="{% url 'menu:list' %}">Continue shopping</a>
    </div>
  </div>
</div>
{% endblock %}

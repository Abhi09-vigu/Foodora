services:
  - type: web
    name: foodora
    env: python
    plan: free
    buildCommand: |
      pip install -r requirements.txt
      python manage.py migrate
      python manage.py collectstatic --noinput
    startCommand: gunicorn restaurant_ecommerce.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.3"
      - key: DEBUG
        value: "0"
      - key: SECRET_KEY
        generateValue: true
      - key: SECURE_SSL_REDIRECT
        value: "1"
      # Render sets RENDER_EXTERNAL_HOSTNAME automatically.

  # Optional: add a managed database in Render UI, then set DATABASE_URL automatically.
